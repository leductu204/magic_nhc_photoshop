
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOOL MAGIC NHC VIP PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      html {
        font-size: 22px; /* Increased base size by ~37% for larger text globally */
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000000;
        color: #e5e7eb;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #18181b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ef4444; 
      }

      @keyframes neon-pulse {
        0%, 100% {
          box-shadow: 0 0 5px rgba(239, 68, 68, 0.2), 0 0 10px rgba(239, 68, 68, 0.1);
        }
        50% {
          box-shadow: 0 0 15px rgba(239, 68, 68, 0.5), 0 0 20px rgba(239, 68, 68, 0.3);
        }
      }
      
      .neon-border {
        box-shadow: 0 0 5px #ef4444, inset 0 0 10px rgba(239, 68, 68, 0.1);
        border: 1px solid #ef4444;
      }

      .glowing-textarea:focus {
        animation: neon-pulse 2s infinite;
        border-color: #ef4444;
        outline: none;
      }

      .neon-text-glow {
        text-shadow: 0 0 5px rgba(239, 68, 68, 0.8), 0 0 15px rgba(239, 68, 68, 0.5), 0 0 20px rgba(239, 68, 68, 0.3);
      }

      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .animate-fade-in {
        animation: fade-in-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
      .animate-shake {
        animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
      }

      /* Rainbow Animations for VIP PRO */
      @keyframes rainbow-border-move {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      @keyframes rainbow-text-vip {
        0% { color: #ff0000; text-shadow: 0 0 12px rgba(255,0,0,0.6); }
        14% { color: #ff7f00; text-shadow: 0 0 12px rgba(255,127,0,0.6); }
        28% { color: #ffff00; text-shadow: 0 0 12px rgba(255,255,0,0.6); }
        42% { color: #00ff00; text-shadow: 0 0 12px rgba(0,255,0,0.6); }
        57% { color: #0000ff; text-shadow: 0 0 12px rgba(0,0,255,0.6); }
        71% { color: #4b0082; text-shadow: 0 0 12px rgba(75,0,130,0.6); }
        85% { color: #9400d3; text-shadow: 0 0 12px rgba(148,0,211,0.6); }
        100% { color: #ff0000; text-shadow: 0 0 12px rgba(255,0,0,0.6); }
      }

      .vip-rainbow-container {
        position: relative;
        padding: 8px 24px;
        background: transparent;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .vip-rainbow-container::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 12px;
        padding: 2.5px;
        background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
        background-size: 400% 400%;
        -webkit-mask: 
           linear-gradient(#fff 0 0) content-box, 
           linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: rainbow-border-move 4s linear infinite;
        pointer-events: none;
      }

      .vip-rainbow-container::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
        background-size: 400% 400%;
        z-index: -1;
        animation: rainbow-border-move 4s linear infinite;
        border-radius: 14px;
        filter: blur(8px);
        opacity: 0.4;
      }

      .vip-rainbow-text {
        animation: rainbow-text-vip 4s linear infinite;
        font-weight: 900;
        letter-spacing: -0.2px;
        text-transform: uppercase;
        position: relative;
        z-index: 2;
      }

      .perspective-1000 {
        perspective: 1000px;
      }

      .bg-grid {
        background-image: 
          linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 30px 30px;
      }

      @keyframes float-y {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @keyframes scan-line {
        0% { top: -10%; }
        100% { top: 110%; }
      }

      .selection-badge {
        background: rgba(14, 165, 233, 0.1);
        border: 1px solid rgba(14, 165, 233, 0.3);
        backdrop-filter: blur(8px);
        padding: 6px 16px;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        gap: 8px;
        animation: float-y 3s ease-in-out infinite;
      }

      .selection-badge::before {
        content: '';
        width: 6px;
        height: 6px;
        background: #0ea5e9;
        border-radius: 50%;
        box-shadow: 0 0 10px #0ea5e9;
        animation: neon-pulse 1.5s infinite;
      }

      .scan-effect {
        position: absolute;
        left: 0;
        width: 100%;
        height: 20%;
        background: linear-gradient(to bottom, transparent, rgba(14, 165, 233, 0.1), transparent);
        animation: scan-line 4s linear infinite;
        pointer-events: none;
      }
    </style>
